<!doctype html>
<html lang="ja">
<head>
	<meta charset="utf-8">
	<meta name="robots" content="noindex">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="icon" href="./favicon.ico?v=2" type="image/x-icon">
	<link rel="shortcut icon" href="./favicon.ico?v=2" type="image/x-icon">
	<title>鶏語変換器</title>
	<style>
		:root {
			color-scheme: light;
			--bg: #f6f4ef;
			--panel: #ffffff;
			--text: #1f2937;
			--muted: #6b7280;
			--border: #d6d3d1;
			--accent: #2563eb;
		}

		body {
			margin: 0;
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: linear-gradient(180deg, #fbfaf7 0%, var(--bg) 100%);
			color: var(--text);
		}

		main {
			max-width: 720px;
			margin: 0 auto;
			padding: 48px 20px;
		}

		.card {
			background: var(--panel);
			border: 1px solid var(--border);
			border-radius: 16px;
			box-shadow: 0 12px 30px rgba(31, 41, 55, 0.08);
			padding: 24px;
		}

		h1 {
			margin: 0 0 12px;
			font-size: 1.6rem;
		}

		p {
			margin: 0 0 20px;
			color: var(--muted);
			line-height: 1.6;
		}

		label {
			display: block;
			font-weight: 600;
			margin: 18px 0 8px;
		}

		input,
		textarea,
		button {
			font: inherit;
		}

		input,
		textarea {
			width: 100%;
			box-sizing: border-box;
			border: 1px solid var(--border);
			border-radius: 12px;
			padding: 12px 14px;
			background: #fff;
			color: var(--text);
		}

		textarea {
			min-height: 120px;
			resize: vertical;
		}

		button {
			margin-top: 20px;
			border: 0;
			border-radius: 999px;
			padding: 12px 18px;
			background: var(--accent);
			color: #fff;
			font-weight: 700;
			cursor: pointer;
		}

		button:hover {
			filter: brightness(0.95);
		}
	</style>
</head>
<body>
	<main>
		<section class="card" aria-labelledby="title">
			<h1 id="title">鶏語変換器</h1>
            <p>注：平仮名・片仮名・大文字小文字アルファベットのみ対応</p>

			<label for="inputText">人間語</label>
			<input id="inputText" type="text" placeholder="変換したい文字列を入力">

			<button type="button" id="convertButton">Click to be a chicken!</button>

			<label for="outputText">鶏語</label>
			<textarea id="outputText" readonly placeholder="ここに翻訳結果が表示されます"></textarea>

			<label for="chickenInput">鶏語（逆変換用）</label>
			<input id="chickenInput" type="text" placeholder="鶏語を入力（例: コーケッ  ケー）">

			<button type="button" id="reverseButtonJP">逆変換（日本語優先）</button>
			<button type="button" id="reverseButtonEN">逆変換（英語優先）</button>

			<label for="reverseOutput">復元結果（人間語）</label>
			<textarea id="reverseOutput" readonly placeholder="ここに逆変換の結果が表示されます"></textarea>
		</section>
        <script type="text/javascript" src="js/chicken.js"></script>
	</main>
</body>
</html>
